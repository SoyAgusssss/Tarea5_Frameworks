<section id="arbitros" class="container my-5">
  <h2 class="mb-4">
    <i class="bi bi-person-badge"></i> Árbitros
  </h2>

  <!-- Spinner de carga -->
  <div *ngIf="cargando" class="text-center py-4">
    <div class="spinner-border text-success" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <ng-container *ngIf="!cargando">
    <!-- Buscador -->
    <form class="mb-3">
      <div class="input-group">
        <input
          type="search"
          class="form-control"
          placeholder="Buscar árbitro..."
          [(ngModel)]="buscador"
          name="buscadorArbitros"
        >
        <button class="btn btn-secondary" type="button">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </form>

    <!-- Listado -->
    <div class="row g-4">
      <div class="col-md-4" *ngFor="let arbitro of arbitrosFiltrados; trackBy: trackByArbitroId">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">{{ arbitro.usuario }}</h5>
            <span *ngIf="arbitro.deporte" class="badge bg-success mb-2">
              {{ arbitro.deporte }}
            </span>
            <p *ngIf="arbitro.equipo">{{ arbitro.equipo }}</p>
            <button class="btn btn-outline-success btn-sm"
                    (click)="seleccionarArbitro(arbitro)"
                    data-bs-toggle="modal"
                    data-bs-target="#modalArbitro">
              Ver ficha
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</section>

<!-- Modal único de árbitro -->
<div class="modal fade" id="modalArbitro" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header text-white bg-success">
        <h5 class="modal-title">{{ arbitroSeleccionado?.usuario }}</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" *ngIf="arbitroSeleccionado as a">
        <strong>Deporte:</strong> {{ a.deporte || '—' }}<br>
        <strong>Email:</strong> {{ a.email }}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-success" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
